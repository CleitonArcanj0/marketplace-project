<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
    <link rel="stylesheet" href="style/mediaqueries.css" media="all">
    <title>MarketHub</title>
</head>

<body>
    <div class="navbar">
        <div class="logo">
            <h1>MarketHub</h1>
        </div>
        <div class="areaBusca">
            <span class="material-symbols-outlined">
                search
            </span>
            <input type="text" placeholder="Buscar Produtos" class="buscarProdutos">
        </div>
        <div class="localizacao">
            <i class="fa-solid fa-location-dot fa-xs"></i>
            <p> Mata escura, Salvador - BA</p>
        </div>

    </div>

    <main class="conteiner">
        <div class="card_produto">

            <img src="https://picsum.photos/200/300" alt="img" class="imagem_produto">

            <h3 class="titulo_produto">Tênis Adidas</h3>
            <p class="descricao"></p>
            <p class="preco">R$ 49,50</p>

        </div>

    
    </main>

    <footer>

    </footer>
</body>

</html>
